services:
  # V免签fox 前端
  vmqfox-frontend:
    image: hulisang/vmqfox-frontend:latest
    container_name: vmqfox-frontend
    ports:
      - "${FRONTEND_PORT:-3006}:80"
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
    depends_on:
      - backend
    networks:
      - vmqfox-network

  # V免签fox 后端
  backend:
    image: hulisang/vmqfox-backend:latest
    container_name: vmqfox-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      - APP_DEBUG=false
      - APP_TRACE=false
      - APP_FRONTEND_URL=${APP_FRONTEND_URL:-http://localhost:3006}
      - DB_TYPE=mysql
      - DB_HOSTNAME=mysql
      - DB_DATABASE=vmq
      - DB_USERNAME=root
      - DB_PASSWORD=${MYSQL_ROOT_PASSWORD:-vmqfox123}
      - DB_HOSTPORT=3306
      - DB_CHARSET=utf8
      - DB_PREFIX=
      - DB_DEBUG=false
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - REDIS_SELECT=0
      - CACHE_DRIVER=file
      - SESSION_DRIVER=file
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - vmqfox-network

  # MySQL（仅在 docker 内部网络可见，不暴露到宿主机以避免和宿主机 MySQL 冲突）
  # 如需从宿主机调试: docker exec -it vmqfox-mysql mysql -uroot -p
  mysql:
    image: mysql:5.7
    container_name: vmqfox-mysql
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-vmqfox123}
      - MYSQL_DATABASE=vmq
      - MYSQL_USER=vmqfox
      - MYSQL_PASSWORD=${MYSQL_ROOT_PASSWORD:-vmqfox123}
      - TZ=Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
      - ./vmqfox-backend/vmq.sql:/docker-entrypoint-initdb.d/vmq.sql:ro
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-vmqfox123}"]
      timeout: 20s
      retries: 10
      interval: 10s
    networks:
      - vmqfox-network

  # 易支付协议适配器
  adapter:
    build: ./vmqfox-adapter
    container_name: vmqfox-adapter
    ports:
      - "${ADAPTER_PORT:-8888}:8888"
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      - PORT=8888
      - VMQ_API_URL=http://backend:8000
      - VMQ_KEY=${VMQ_KEY:-}
      - EPAY_PID=${EPAY_PID:-1001}
      - EPAY_KEY=${EPAY_KEY:-}
      - ADAPTER_INTERNAL_URL=http://adapter:8888
    volumes:
      - adapter_data:/data
    depends_on:
      - backend
    networks:
      - vmqfox-network

  # Redis（仅在 docker 内部网络可见，不暴露到宿主机）
  redis:
    image: redis:7-alpine
    container_name: vmqfox-redis
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 3s
      retries: 5
      interval: 5s
    networks:
      - vmqfox-network

volumes:
  mysql_data:
  redis_data:
  adapter_data:

networks:
  vmqfox-network:
    driver: bridge
